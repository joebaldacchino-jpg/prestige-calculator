<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Prestige — Development Cost Calculator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#F9F7F2;font-family:'DM Sans',sans-serif}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}
input:focus,textarea:focus,select:focus{outline:none!important;border-color:#B8960C!important;box-shadow:0 0 0 3px rgba(185,150,12,0.12)!important}
input[type=range]{accent-color:#B8960C}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:28px;right:28px;background:#0D1F3C;color:#D4AF5A;padding:11px 22px;border-radius:6px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;z-index:9997;box-shadow:0 8px 32px rgba(0,0,0,0.3);animation:fadeIn 0.25s ease}
@media print{.no-print{display:none!important}body{background:white!important}*{box-shadow:none!important}.card-print{border:1px solid #ddd!important;margin-bottom:16px!important;page-break-inside:avoid}.print-footer{display:block!important}}
.print-footer{display:none}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useCallback}=React;
const M="#0D1F3C",G="#B8960C",GL="#D4AF5A",GLA="#F5EDD6",BG="#F9F7F2";
const n=v=>parseFloat(v)||0;
const fmt=v=>"€"+n(v).toLocaleString("en",{minimumFractionDigits:2,maximumFractionDigits:2});
const pct=v=>n(v).toFixed(2)+"%";
const uid=()=>Math.random().toString(36).substr(2,9);
const ts=()=>new Date().toLocaleString("en-GB",{day:"2-digit",month:"short",year:"numeric",hour:"2-digit",minute:"2-digit"});
const tod=()=>new Date().toISOString().split("T")[0];
const lsGet=(k,d)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch{return d;}};
const lsSet=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}};

const FK=["basement","ground","first","second","third","fourth","penthouse"];
const FL={basement:"Basement Level",ground:"Ground Floor",first:"First Floor",second:"Second Floor",third:"Third Floor",fourth:"Fourth Floor",penthouse:"Penthouse Level"};
const FINK=["Scaffolding - Erection & Dismantling","Scaffolding - Rent","Basement Level","Ground Floor","First Floor","Second Floor","Third Floor","Fourth Floor","Penthouse Level","Terraces","Backyard & Front Garden","Common Parts"];
const MISCK=["Roof Screed","Garage Floors","Landscaping","Services Culvert","Pavement Finishes"];
const EXK=["Tower Crane","Concrete Block Retaining Walls","Piling Works","Capping Beams","Platform"];
const OTHK=["Contract Fees","Stamp Duty","PA Permits","Loss of Parking Spaces (UIF)","Insurance Policies","Ground Investigation Report","OHS & STO"];
const RCATS=["All","Demolition","Excavation","Construction Shell","Finishing Works","Plastering","Miscellaneous","Architect","Other"];
const RUNITS=["€/m²","€/yd³","€/hr","€ lump sum","€/linear m","€/unit"];
const UM={"EURm2":"€/m²","EURyd3":"€/yd³","EURhr":"€/hr","EURlump":"€ lump sum","EURlinm":"€/linear m","EURunit":"€/unit"};
const EP="Extract all rate/price line items from this contractor quote. Return ONLY a valid JSON array, no markdown, no backticks, no preamble. Each object: contractor (company name), date (YYYY-MM-DD), category (one of: Demolition Excavation Construction-Shell Finishing-Works Plastering Miscellaneous Architect Other), item (work description), rate (numeric string only no currency), unit (one of: EURm2 EURyd3 EURhr EURlump EURlinm EURunit), notes (conditions or empty string).";

const newRow=()=>({id:uid(),label:"",on:true,mode:"lump",value:"",rate:""});
const newRE=()=>({id:uid(),contractor:"",date:tod(),category:"Construction Shell",item:"",rate:"",unit:"€/m²",notes:"",active:false});
const defPF=()=>[
  {id:"basement",label:"Basement",area:"",doors:"",windows:"",mw:"",on:true},
  {id:"ground",label:"Ground Floor",area:"",doors:"",windows:"",mw:"",on:true},
  {id:"first",label:"First Floor",area:"",doors:"",windows:"",mw:"",on:true},
  {id:"second",label:"Second Floor",area:"",doors:"",windows:"",mw:"",on:true},
  {id:"third",label:"Third Floor",area:"",doors:"",windows:"",mw:"",on:true},
  {id:"fourth",label:"Fourth Floor",area:"",doors:"",windows:"",mw:"",on:false},
  {id:"penthouse",label:"Penthouse Level",area:"",doors:"",windows:"",mw:"",on:true},
];

const defProject=()=>({
  id:uid(),name:"New Project",lastEdited:ts(),
  site:{address:"",date:tod(),purchasePrice:"",footprint:"",depth:""},
  demo:"",demoCustom:[],
  excavRate:"30",excavManual:false,excavOverride:"",excavCustom:[],
  floors:FK.reduce((a,k)=>({...a,[k]:{sqm:"",rate:""}}),{}),
  common:{mode:"sqm",sqm:"",rate:"",lump:""},backyard:"",s3Custom:[],
  archOn:true,archManual:false,archOverride:"",
  fin:FINK.reduce((a,k)=>({...a,[k]:{on:false,mode:"lump",value:"",rate:""}}),{}),finCustom:[],
  misc:MISCK.reduce((a,k)=>({...a,[k]:{on:false,value:""}}),{}),miscCustom:[],
  ex:EXK.reduce((a,k)=>({...a,[k]:{on:false,value:""}}),{}),exCustom:[],
  other:OTHK.reduce((a,k)=>({...a,[k]:{on:false,value:""}}),{}),otherCustom:[],
  contingOn:true,vatOn:true,
  units:[{id:uid(),name:"",qty:"",price:""}],targetMargin:"20",totalUnitsTarget:"",
  notes:{s1:"",s2:"",s3:"",s4:"",s5:"",s6:"",s7:"",s8:""},
});

function calc(p){
  const fp=n(p.site.footprint),m3=fp*n(p.site.depth),yds=m3*1.30795,exAuto=yds*n(p.excavRate);
  const s1=n(p.demo)+(p.demoCustom||[]).reduce((a,r)=>a+(r.on?n(r.value):0),0);
  const s2=(p.excavManual?n(p.excavOverride):exAuto)+(p.excavCustom||[]).reduce((a,r)=>a+(r.on?n(r.value):0),0);
  const fs=FK.reduce((a,k)=>a+n(p.floors[k].sqm)*n(p.floors[k].rate),0);
  const ct=p.common.mode==="sqm"?n(p.common.sqm)*n(p.common.rate):n(p.common.lump);
  const s3=fs+ct+n(p.backyard)+(p.s3Custom||[]).reduce((a,r)=>a+(r.on?n(r.value):0),0);
  const aAuto=s3*0.02,aT=p.archOn?(p.archManual?n(p.archOverride):aAuto):0;
  const s4=Object.entries(p.fin).reduce((a,[,v])=>a+(v.on?(v.mode==="lump"?n(v.value):n(v.rate)*fp):0),0)+(p.finCustom||[]).reduce((a,r)=>a+(r.on?(r.mode==="lump"?n(r.value):n(r.rate)*fp):0),0);
  const s5=Object.values(p.misc).reduce((a,v)=>a+(v.on?n(v.value):0),0)+(p.miscCustom||[]).reduce((a,r)=>a+(r.on?n(r.value):0),0);
  const s6=Object.values(p.ex).reduce((a,v)=>a+(v.on?n(v.value):0),0)+(p.exCustom||[]).reduce((a,r)=>a+(r.on?n(r.value):0),0);
  const s8=n(p.site.purchasePrice)+Object.values(p.other).reduce((a,v)=>a+(v.on?n(v.value):0),0)+(p.otherCustom||[]).reduce((a,r)=>a+(r.on?n(r.value):0),0);
  const sub=s1+s2+s3+s4+s5+s6+aT,cont=p.contingOn?(s3+s4)*0.1:0,pv=sub+cont,vat=p.vatOn?pv*0.18:0,cc=pv+vat,gt=cc+s8;
  const tu=p.units.reduce((a,u)=>a+n(u.qty),0),gr=p.units.reduce((a,u)=>a+n(u.qty)*n(u.price),0);
  const af=gr*0.05,av=af*0.18,vt=gr*0.08,np=gr-af-av-vt-gt,nm=gr>0?(np/gr)*100:0;
  const tm=n(p.targetMargin)/100,den=0.861-tm,sr=den>0&&gt>0?gt/den:0;
  const tgt=n(p.totalUnitsTarget),spu=(tgt>0?tgt:tu)>0?sr/(tgt>0?tgt:tu):0;
  const tba=FK.reduce((a,k)=>a+n(p.floors[k].sqm),0)+(p.common.mode==="sqm"?n(p.common.sqm):0);
  const cpsm=tba>0?gt/tba:0,roi=gt>0?(np/gt)*100:0,beu=tu>0?gt/(tu*0.861):0;
  const sens=[-20,-15,-10,-5,0,5,10].map(dp=>{const r=gr*(1+dp/100),f=r*0.05,fv=f*0.18,v2=r*0.08,pr=r-f-fv-v2-gt;return{dp,rev:r,profit:pr,margin:r>0?(pr/r)*100:0};});
  return{m3,yds,exAuto,s1,s2,s3,s4,s5,s6,s8,aAuto,aT,sub,cont,pv,vat,cc,gt,tu,gr,af,av,vt,np,nm,sr,spu,tgt,tba,cpsm,roi,beu,sens,ct,fs};
}

function calcLF(lf){
  const land=n(lf.landPrice),units=n(lf.units),floors=n(lf.floors);
  const bpf=n(lf.builtArea),tb=bpf*floors,cc=tb*n(lf.constCostSqm),ti=land+cc;
  const tm=n(lf.margin)/100,den=0.861-tm;
  const rGDV=den>0&&ti>0?ti/den:0,rPPU=units>0?rGDV/units:0;
  const mGDV=n(lf.mktPrice)*units,mAF=mGDV*0.05,mAV=mAF*0.18,mVT=mGDV*0.08;
  const mNP=mGDV-mAF-mAV-mVT-ti,mMarg=mGDV>0?(mNP/mGDV)*100:0;
  const maxL=den>0?mGDV*(0.861-tm)-cc:0,cpsm=tb>0?ti/tb:0;
  const sig=mMarg>=n(lf.margin)?"green":mMarg>=n(lf.margin)-5?"amber":"red";
  return{tb,cc,ti,rGDV,rPPU,mGDV,mNP,mMarg,maxL,cpsm,sig};
}

const IS={width:"100%",padding:"8px 12px",border:"1px solid #ddd",borderRadius:4,fontSize:13,fontFamily:"'DM Sans',sans-serif",background:"white",color:M,boxSizing:"border-box"};
const DIS={...IS,background:"#f5f5f5",color:"#999"};
const GIS={...IS,borderColor:G,background:GLA};
const LBL={fontSize:12,color:"#666",fontFamily:"'DM Sans',sans-serif",fontWeight:500,marginBottom:4};
const CARD={background:"white",borderRadius:8,boxShadow:"0 2px 16px rgba(13,31,60,0.07)",marginBottom:24,overflow:"hidden",border:"1px solid rgba(184,150,12,0.12)"};

function NI({value,onChange,placeholder,disabled,style}){return <input type="number" value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder||"0.00"} disabled={disabled} style={{...(disabled?DIS:IS),...style}}/>;}
function TI({value,onChange,placeholder,style}){return <input type="text" value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} style={{...IS,...style}}/>;}
function Tog({on,onChange,labels}){const[a,b]=labels||["ON","OFF"];return <button onClick={()=>onChange(!on)} style={{padding:"4px 14px",borderRadius:20,border:`1px solid ${on?G:"#ccc"}`,background:on?G:"white",color:on?"white":"#aaa",fontSize:11,cursor:"pointer",fontFamily:"'DM Sans',sans-serif",fontWeight:600,whiteSpace:"nowrap",flexShrink:0}}>{on?a:b}</button>;}
function SH({num,title,subtitle}){return <div style={{background:M,padding:"13px 20px",borderRadius:"8px 8px 0 0"}}><div style={{display:"flex",alignItems:"baseline",gap:10}}><span style={{fontFamily:"'Playfair Display',serif",color:GL,fontSize:11,opacity:0.8}}>{num}</span><span style={{fontFamily:"'Playfair Display',serif",color:"white",fontSize:17,fontWeight:600}}>{title}</span></div>{subtitle&&<div style={{fontSize:11,color:"rgba(212,175,90,0.6)",marginTop:2}}>{subtitle}</div>}</div>;}
function TR({label,value,highlight,large,muted}){return <div style={{display:"flex",justifyContent:"space-between",padding:highlight?"12px 20px":"10px 20px",background:highlight?GLA:"white",borderTop:"1px solid #f0ede6",fontFamily:"'DM Sans',sans-serif"}}><span style={{fontSize:muted?12:13,color:muted?"#aaa":"#555",fontWeight:highlight?600:400}}>{label}</span><span style={{fontSize:large?16:13,fontWeight:highlight?700:600,color:highlight?M:"#888"}}>{fmt(value)}</span></div>;}
function ColH({children}){return <div style={{fontSize:10,color:G,fontFamily:"'DM Sans',sans-serif",fontWeight:600,textTransform:"uppercase",letterSpacing:1}}>{children}</div>;}
function KPI({label,value}){return <div style={{padding:"13px 20px",textAlign:"center",borderRight:"1px solid rgba(184,150,12,0.15)"}}><div style={{fontSize:10,color:G,fontWeight:600,textTransform:"uppercase",letterSpacing:1,marginBottom:4}}>{label}</div><div style={{fontFamily:"'Playfair Display',serif",color:M,fontSize:15,fontWeight:600}}>{value}</div></div>;}
function NoteField({value,onChange}){const[o,sO]=useState(false);return <div style={{padding:"0 20px 10px"}}><button onClick={()=>sO(x=>!x)} style={{fontSize:11,color:o?G:"#bbb",background:"none",border:"none",cursor:"pointer",fontFamily:"'DM Sans',sans-serif",padding:0}}>{o?"Hide Notes":"+ Notes"}</button>{o&&<textarea value={value} onChange={e=>onChange(e.target.value)} placeholder="Notes, assumptions, contractor references..." rows={2} style={{...IS,marginTop:8,resize:"vertical",lineHeight:1.5}}/>}</div>;}
function CustomRows({rows,onChange,hasMode,fp}){
  const add=()=>onChange([...rows,newRow()]);
  const rm=id=>onChange(rows.filter(r=>r.id!==id));
  const upd=(id,f,v)=>onChange(rows.map(r=>r.id===id?{...r,[f]:v}:r));
  return <div style={{padding:"0 20px 10px"}}>
    {rows.map(r=><div key={r.id} style={{display:"grid",gridTemplateColumns:hasMode?"2fr 50px 65px 1fr 22px":"2fr 50px 1fr 22px",gap:7,marginBottom:5,alignItems:"center",opacity:r.on?1:0.5}}>
      <TI value={r.label} onChange={v=>upd(r.id,"label",v)} placeholder="Custom item..."/>
      <Tog on={r.on} onChange={v=>upd(r.id,"on",v)}/>
      {hasMode&&<button onClick={()=>upd(r.id,"mode",r.mode==="lump"?"sqm":"lump")} disabled={!r.on} style={{fontSize:10,padding:"3px 7px",borderRadius:20,border:`1px solid ${G}`,background:"white",color:G,cursor:"pointer",opacity:r.on?1:0.35}}>{r.mode==="lump"?"Lump":"€/m²"}</button>}
      {hasMode&&r.mode==="sqm"?<NI value={r.rate} onChange={v=>upd(r.id,"rate",v)} disabled={!r.on} placeholder="€/m²"/>:<NI value={r.value} onChange={v=>upd(r.id,"value",v)} disabled={!r.on} placeholder="€"/>}
      <button onClick={()=>rm(r.id)} style={{background:"none",border:"none",color:"#ccc",cursor:"pointer",fontSize:16,padding:0}}>×</button>
    </div>)}
    <button onClick={add} style={{fontSize:11,color:G,background:"none",border:`1px dashed ${G}`,borderRadius:4,cursor:"pointer",padding:"4px 10px",fontFamily:"'DM Sans',sans-serif"}}>+ Add Row</button>
  </div>;
}

function App(){
  const [projects,setProjects]=useState(null);
  const [curId,setCurId]=useState(null);
  const [rateLib,setRateLib]=useState([]);
  const [newRate,setNewRate]=useState(newRE());
  const [rlFilter,setRlFilter]=useState("All");
  const [lf,setLf]=useState({address:"",date:tod(),agentName:"",landPrice:"",footprint:"",floors:"",units:"",builtArea:"",constCostSqm:"",margin:"20",mktPrice:"",notes:""});
  const [tab,setTab]=useState("calc");
  const [cmpId,setCmpId]=useState(null);
  const [resetConfirm,setResetConfirm]=useState(false);
  const [saving,setSaving]=useState(false);
  const [loaded,setLoaded]=useState(false);
  const [disclaim,setDisclaim]=useState(true);
  const [dChk,setDChk]=useState(false);
  const [toast,setToast]=useState("");
  const [upState,setUpState]=useState("idle");
  const [extracted,setExtracted]=useState([]);
  const [upErr,setUpErr]=useState("");
  const [pasteText,setPasteText]=useState("");
  const [pf,setPf]=useState(defPF());
  const [pMult,setPMult]=useState("2.3");
  const [pH,setPH]=useState("2.7");
  const [pRate,setPRate]=useState("");
  const [pCont,setPCont]=useState("10");
  const [pMode,setPMode]=useState("approx");

  const showToast=(msg)=>{setToast(msg);setTimeout(()=>setToast(""),2500);};
  const upPF=(id,f,v)=>setPf(prev=>prev.map(r=>r.id===id?{...r,[f]:v}:r));

  useEffect(()=>{
    const pr=lsGet("px:projects",null),cu=lsGet("px:curId",null),rl=lsGet("px:rateLib",[]),da=lsGet("px:disc",null);
    const lp=pr||[defProject()];
    setProjects(lp);setCurId(cu||lp[0].id);setRateLib(rl);
    if(da)setDisclaim(false);
    setLoaded(true);
  },[]);

  useEffect(()=>{
    if(!loaded||!projects||!curId)return;
    const t=setTimeout(()=>{setSaving(true);lsSet("px:projects",projects);lsSet("px:curId",curId);lsSet("px:rateLib",rateLib);setTimeout(()=>setSaving(false),400);},700);
    return()=>clearTimeout(t);
  },[projects,curId,rateLib,loaded]);

  const cur=projects?.find(p=>p.id===curId)||projects?.[0];
  const upd=useCallback(fn=>setProjects(prev=>prev.map(p=>p.id===curId?{...fn(p),lastEdited:ts()}:p)),[curId]);
  const set=useCallback((k,v)=>upd(p=>({...p,[k]:v})),[upd]);
  const setSite=useCallback((k,v)=>upd(p=>({...p,site:{...p.site,[k]:v}})),[upd]);
  const setNote=useCallback((k,v)=>upd(p=>({...p,notes:{...p.notes,[k]:v}})),[upd]);
  const setFloor=useCallback((fk,f,v)=>upd(p=>({...p,floors:{...p.floors,[fk]:{...p.floors[fk],[f]:v}}})),[upd]);
  const setFin=useCallback((fk,f,v)=>upd(p=>({...p,fin:{...p.fin,[fk]:{...p.fin[fk],[f]:v}}})),[upd]);
  const setMisc=useCallback((fk,f,v)=>upd(p=>({...p,misc:{...p.misc,[fk]:{...p.misc[fk],[f]:v}}})),[upd]);
  const setEx=useCallback((fk,f,v)=>upd(p=>({...p,ex:{...p.ex,[fk]:{...p.ex[fk],[f]:v}}})),[upd]);
  const setOther=useCallback((fk,f,v)=>upd(p=>({...p,other:{...p.other,[fk]:{...p.other[fk],[f]:v}}})),[upd]);
  const setUnit=(id,f,v)=>upd(p=>({...p,units:p.units.map(u=>u.id===id?{...u,[f]:v}:u)}));
  const addUnit=()=>upd(p=>({...p,units:[...p.units,{id:uid(),name:"",qty:"",price:""}]}));
  const rmUnit=id=>upd(p=>({...p,units:p.units.filter(u=>u.id!==id)}));
  const handleSave=()=>{setSaving(true);lsSet("px:projects",projects);lsSet("px:curId",curId);lsSet("px:rateLib",rateLib);setTimeout(()=>{setSaving(false);showToast("Project saved");},400);};
  const handleNew=()=>{const p=defProject();setProjects(prev=>[...prev,p]);setCurId(p.id);setTab("calc");showToast("New project created");};
  const dupProject=()=>{const p={...JSON.parse(JSON.stringify(cur)),id:uid(),name:cur.name+" (Copy)",lastEdited:ts()};setProjects(prev=>[...prev,p]);setCurId(p.id);setTab("calc");showToast("Project duplicated");};
  const delProject=id=>{setProjects(prev=>{const nx=prev.filter(p=>p.id!==id);if(id===curId)setCurId(nx[0]?.id);return nx.length?nx:[defProject()];});};
  const resetProject=()=>{const p=defProject();setProjects(prev=>prev.map(q=>q.id===curId?p:q));setCurId(p.id);setResetConfirm(false);showToast("Project reset");};
  const acceptDisc=()=>{if(!dChk)return;lsSet("px:disc",{accepted:true});setDisclaim(false);};

  const callAPI=async(messages)=>{
    const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,messages})});
    const data=await res.json();
    if(data.error)throw new Error(data.error.message||"API error");
    const txt=data.content.filter(i=>i.type==="text").map(i=>i.text).join("");
    return JSON.parse(txt.replace(/```json|```/g,"").trim());
  };

  const applyExtracted=(parsed)=>{setExtracted(parsed.map(r=>({...r,id:uid(),selected:true,unit:UM[r.unit]||r.unit||"€ lump sum"})));setUpState("preview");};

  const parseRatesFromText=async(text)=>{
    setUpState("extracting");setUpErr("");
    try{const p=await callAPI([{role:"user",content:[{type:"text",text:EP+"\n\nQuote text:\n\n"+text}]}]);applyExtracted(p);}
    catch(e){if(e.message==="Failed to fetch"||e.message.includes("NetworkError")||e.message.includes("network")){setUpState("pastemode");}else{setUpState("error");setUpErr(e.message);}}
  };

  const handleUpload=async(file)=>{
    if(!file)return;
    const ext=file.name.split(".").pop().toLowerCase();
    setUpState("extracting");setUpErr("");
    try{
      if(ext==="pdf"){
        const b64=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(",")[1]);r.onerror=rej;r.readAsDataURL(file);});
        const p=await callAPI([{role:"user",content:[{type:"document",source:{type:"base64",media_type:"application/pdf",data:b64}},{type:"text",text:EP}]}]);
        applyExtracted(p);
      } else if(["xlsx","xls"].includes(ext)){
        const ab=await file.arrayBuffer();
        const wb=window.XLSX.read(ab,{type:"array"});
        let text="";wb.SheetNames.forEach(s=>{text+="Sheet: "+s+"\n"+window.XLSX.utils.sheet_to_csv(wb.Sheets[s])+"\n\n";});
        await parseRatesFromText(text);
      } else if(["doc","docx"].includes(ext)){
        const ab=await file.arrayBuffer();
        const result=await window.mammoth.extractRawText({arrayBuffer:ab});
        await parseRatesFromText(result.value);
      } else {
        const text=await file.text();
        await parseRatesFromText(text);
      }
    }catch(e){

          <div style={{textAlign:"center"}}><div style={{fontSize:9,color:G,fontWeight:600,textTransform:"uppercase",letterSpacing:1,marginBottom:2}}>Margin</div><div style={{fontSize:12,fontWeight:600,color:pc.nm>=0?G:"#c0392b"}}>{pct(pc.nm)}</div></div>
          <div style={{display:"flex",gap:6,alignItems:"center"}}>
            {!isA&&<button onClick={()=>{setCurId(p.id);setTab("calc");}} style={{padding:"5px 12px",background:M,color:"white",border:"none",borderRadius:4,cursor:"pointer",fontSize:11,fontFamily:"'DM Sans',sans-serif",fontWeight:600}}>Open</button>}
            {isA&&<span style={{fontSize:10,color:G,fontWeight:600,padding:"5px 8px"}}>● Active</span>}
            {projects.length>1&&<button onClick={()=>delProject(p.id)} style={{padding:"5px 8px",background:"none",border:"1px solid #eee",borderRadius:4,cursor:"pointer",color:"#bbb",fontSize:12}}>×</button>}
          </div>
        </div>
      );})}
    </div>}
